<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FAFAF7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Casarico Board">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231B1E20'/%3E%3Ctext x='16' y='22' font-family='Georgia,serif' font-size='19' fill='%23fff' text-anchor='middle'%3EC%3C/text%3E%3C/svg%3E">
<title>Casarico — Board Hub</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:opsz,wght@6..72,500;6..72,600&display=swap');

:root{
  --bg:#FAFAF7;
  --surface:#FFFFFF;
  --ink:#1B1E20;
  --muted:#6C7176;
  --faint:#9AA0A4;
  --line:#E8E6DF;
  --line-soft:#F0EEE8;
  --pos:#1E7F4F;
  --pos-bg:#EAF5EF;
  --neg:#C23934;
  --neg-bg:#FBEFEE;
  --act:#9A5B00;
  --act-bg:#FBF3E6;
  --disc:#2E5AAC;
  --disc-bg:#EEF3FB;
  --radius:10px;
  --side:224px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--ink);
  font:400 15px/1.6 Inter,-apple-system,"Segoe UI",sans-serif;
  -webkit-font-smoothing:antialiased;
}
::selection{background:#E8E2D2}

/* ---------- layout ---------- */
.side{
  position:fixed;inset:0 auto 0 0;width:var(--side);
  border-right:1px solid var(--line);background:var(--bg);
  padding:26px 20px 18px;display:flex;flex-direction:column;gap:18px;overflow-y:auto;
}
.main{margin-left:var(--side);padding:44px 56px 120px;max-width:960px}

/* ---------- sidebar ---------- */
.brand{font:600 15px/1.3 Inter;letter-spacing:-.01em}
.brand small{display:block;font:400 11.5px/1.5 Inter;color:var(--muted);margin-top:2px}
.nav{display:flex;flex-direction:column;gap:1px;font-size:13.5px}
.nav a{color:var(--muted);text-decoration:none;padding:6px 9px;border-radius:6px}
.nav a:hover{color:var(--ink);background:var(--line-soft)}
.nav a.on{color:var(--ink);background:var(--line-soft);font-weight:500}
.side-foot{margin-top:auto;font-size:11.5px;color:var(--faint);line-height:1.6}
.side-foot button{margin-top:8px;width:100%}
.badge{display:inline-block;font:500 11px/1.5 Inter;padding:3px 9px;border-radius:99px;background:var(--line-soft);color:var(--muted)}
.badge.warn{background:var(--act-bg);color:var(--act)}
.badge.ok{background:var(--pos-bg);color:var(--pos)}
.role{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:var(--surface);font-size:12px}
.role .who{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.role .dot{flex:none;width:8px;height:8px;border-radius:99px;background:var(--faint)}
.role.editor .dot{background:var(--pos)}
.role.viewer .dot{background:var(--disc)}

/* ---------- typography ---------- */
.eyebrow{font:500 11px/1 Inter;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px}
h1{font:500 30px/1.15 Newsreader,Georgia,serif;letter-spacing:-.01em;margin-bottom:4px}
h2{font:500 24px/1.2 Newsreader,Georgia,serif}
h3{font:600 13.5px/1.4 Inter;margin:30px 0 10px}
h3 .small{font-weight:400}
.lede{color:var(--muted);max-width:640px}
.small{font-size:12.5px;color:var(--muted)}
.crumb{font-size:13px;margin-bottom:16px}
.crumb a{color:var(--muted);text-decoration:none}
.crumb a:hover{color:var(--ink)}
.head-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:6px}

/* ---------- tags & chips ---------- */
.tag{display:inline-block;font:500 10.5px/1 Inter;text-transform:uppercase;letter-spacing:.07em;
  padding:4px 8px;border-radius:99px;white-space:nowrap;cursor:default}
.tag.inform{background:var(--line-soft);color:var(--muted)}
.tag.discuss{background:var(--disc-bg);color:var(--disc)}
.tag.decide{background:var(--act-bg);color:var(--act)}
.tag.click{cursor:pointer}
.chip{display:inline-block;font:500 11.5px/1 Inter;padding:4px 10px;border-radius:99px;white-space:nowrap;cursor:default}
.chip.pos{background:var(--pos-bg);color:var(--pos)}
.chip.neg{background:var(--neg-bg);color:var(--neg)}
.chip.mut{background:var(--line-soft);color:var(--muted)}
.chip.act{background:var(--act-bg);color:var(--act)}
.chip.disc{background:var(--disc-bg);color:var(--disc)}
.chip.click{cursor:pointer}
.ichip{display:inline-block;font:500 12px/1 Inter;padding:5px 11px;border-radius:99px;
  border:1px solid var(--line);color:var(--muted);cursor:pointer;background:var(--surface)}
.ichip:hover{border-color:var(--muted);color:var(--ink)}
.ichip.on{background:var(--ink);border-color:var(--ink);color:#fff}
.chiprow{display:flex;gap:6px;flex-wrap:wrap;align-items:center}

/* ---------- cards & grids ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.g4{grid-template-columns:repeat(4,1fr)}
.kpi .lab{font:500 11px/1 Inter;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.kpi .val{font:500 25px/1.2 Newsreader,Georgia,serif;margin-top:8px;font-variant-numeric:tabular-nums}
.kpi .sub{font-size:12.5px;color:var(--muted);margin-top:4px}

/* ---------- tables & rows ---------- */
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{font:500 11px/1 Inter;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);
  text-align:left;padding:0 12px 8px 0;border-bottom:1px solid var(--line)}
td{padding:10px 12px 10px 0;border-bottom:1px solid var(--line-soft);vertical-align:top}
tr:last-child td{border-bottom:none}
.num{font-variant-numeric:tabular-nums}
.t-right{text-align:right}
.rowlink{cursor:pointer}
.rowlink:hover td{background:var(--line-soft)}
.rowtitle{font-weight:500}

/* ---------- editable ---------- */
[contenteditable="true"]{outline:none;border-radius:6px;min-width:24px}
[contenteditable="true"]:hover{background:var(--line-soft)}
[contenteditable="true"]:focus{background:#FFFDF5;box-shadow:0 0 0 1px #E4D3AE}
[contenteditable="true"]:empty::before{content:attr(data-ph);color:var(--faint);font-style:italic}
.field .k{font:500 11px/1.9 Inter;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.notes{border:1px dashed var(--line);border-radius:8px;padding:12px 14px;margin-top:6px;min-height:44px}

/* ---------- board-pack: memo / ask / learn ---------- */
.memo{display:grid;grid-template-columns:130px 1fr;gap:8px 24px;margin-top:14px}
.memo .k{font:500 11px/1.9 Inter;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding-top:2px}
.memo .v{min-width:0}
.ask{margin-top:16px;background:var(--act-bg);border:1px solid #EBD9BC;border-radius:var(--radius);
  padding:14px 18px;display:flex;gap:12px;align-items:baseline}
.ask .k{font:600 11px/1.7 Inter;text-transform:uppercase;letter-spacing:.08em;color:var(--act);white-space:nowrap}
.mark{display:inline-flex;width:20px;height:20px;border-radius:99px;align-items:center;justify-content:center;
  font:600 11px/1 Inter;flex:none;margin-top:1px}
.mark.w{background:var(--pos-bg);color:var(--pos)}
.mark.f{background:var(--neg-bg);color:var(--neg)}
.pair{display:flex;gap:10px}
.learn{border-left:2px solid var(--line);padding:2px 0 2px 16px;margin:12px 0}
.learn .what{font-weight:500}
.learn .so{color:var(--muted);font-size:13.5px;margin-top:3px}
.learn .link{font-size:12.5px;margin-top:6px}
.learn .link a{color:var(--act);text-decoration:none;border-bottom:1px solid #E4CFA3}

/* ---------- tasks ---------- */
.task{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--line-soft)}
.task:last-child{border-bottom:none}
.tick{flex:none;width:18px;height:18px;border-radius:99px;border:1.5px solid var(--faint);cursor:pointer;margin-top:2px;
  display:inline-flex;align-items:center;justify-content:center;font:600 11px/1 Inter;color:#fff;background:transparent}
.tick:hover{border-color:var(--pos)}
.tick.done{background:var(--pos);border-color:var(--pos)}
.tick.ro{cursor:default}
.task .body{flex:1;min-width:0}
.task .meta{font-size:12px;color:var(--muted);margin-top:2px;display:flex;gap:10px;flex-wrap:wrap;align-items:baseline}
.task .meta a{color:var(--muted);text-decoration:none;border-bottom:1px solid var(--line)}
.task .meta a:hover{color:var(--ink)}
.task.done .text{color:var(--faint);text-decoration:line-through}

/* ---------- list items ---------- */
.item{display:flex;align-items:baseline;gap:10px;padding:8px 0;border-bottom:1px solid var(--line-soft)}
.item:last-child{border-bottom:none}
.item .grow{flex:1;min-width:0}

/* ---------- chart ---------- */
.chart-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 18px 8px;margin-top:12px}
.chart-wrap svg{width:100%;height:auto;display:block}
.legend{display:flex;gap:18px;font-size:12px;color:var(--muted);padding:2px 2px 8px}
.legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:-1px}

/* ---------- flywheel ---------- */
.fly{display:flex;justify-content:center;padding:10px 0 4px}
.fly svg{max-width:520px;width:100%;height:auto}
.fly text{font:500 12.5px Inter;fill:var(--ink)}

/* ---------- buttons ---------- */
button{
  font:500 13px/1 Inter;color:var(--ink);background:var(--surface);
  border:1px solid var(--line);border-radius:8px;padding:9px 14px;cursor:pointer;
}
button:hover{border-color:var(--muted)}
button.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
button.ghost{border:none;background:none;color:var(--faint);padding:4px 6px}
button.ghost:hover{color:var(--neg);background:none}
button.g{background:#fff;border:1px solid var(--line);width:auto}
.btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.empty{color:var(--muted);font-size:13.5px;padding:14px 0}

/* ---------- sign-in gate ---------- */
.gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);z-index:60}
.gate .box{max-width:380px;width:100%;text-align:center;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:36px 30px}
.gate h2{margin:14px 0 8px}
.gate p{color:var(--muted);font-size:14px;margin-bottom:22px}
.gate .gbtn{display:inline-flex;align-items:center;gap:10px;font:500 14px/1 Inter;padding:12px 20px;border-radius:10px;
  border:1px solid var(--line);background:#fff;cursor:pointer}
.gate .gbtn:hover{border-color:var(--muted)}
.gate .crest{width:52px;height:52px;border-radius:13px;background:var(--ink);color:#fff;display:inline-flex;align-items:center;justify-content:center;
  font:600 26px/1 Georgia,serif}

/* ---------- toast ---------- */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translate(-50%,8px);opacity:0;
  background:var(--ink);color:#fff;font:500 13px/1 Inter;padding:11px 16px;border-radius:99px;
  transition:.25s;pointer-events:none;z-index:70;
}
#toast.show{opacity:1;transform:translate(-50%,0)}

/* ---------- print ---------- */
@media print{
  .side,.btnrow,button,#toast,.tick{display:none!important}
  .main{margin:0;padding:0;max-width:none}
  body{background:#fff;font-size:12px}
  .card,.chart-wrap{border-color:#ddd}
}

/* ---------- mobile ---------- */
@media (max-width:900px){
  .side{position:sticky;top:0;inset:auto;width:100%;flex-direction:row;align-items:center;
    gap:12px;padding:10px 16px;border-right:none;border-bottom:1px solid var(--line);z-index:40;overflow-x:auto}
  .side .brand small,.side-foot{display:none}
  .nav{flex-direction:row;gap:2px;white-space:nowrap}
  .main{margin:0;padding:28px 18px 80px}
  .g2,.g3,.g4{grid-template-columns:1fr}
  .memo{grid-template-columns:1fr;gap:2px 0}
  .memo .k{margin-top:12px}
}
</style>
</head>

function normalize(db){
  if (!db || typeof db !== 'object') return seedDB();
  db.version = 2;
  if (!Array.isArray(db.initiatives)) db.initiatives = [];
  if (!Array.isArray(db.meetings)) db.meetings = [];
  if (!Array.isArray(db.reports)) db.reports = [];
  if (!Array.isArray(db.tasks)) db.tasks = [];
  if (!db.strategy) db.strategy = seedDB().strategy;
  var s = db.strategy;
  if (!s.promises) s.promises = {buyer:'',swapper:'',agent:''};
  if (!Array.isArray(s.connect)) s.connect = [];
  if (!Array.isArray(s.risks)) s.risks = [];
  if (typeof s.thesis !== 'string') s.thesis = '';
  if (typeof s.rule !== 'string') s.rule = '';
  db.meetings.forEach(function(m){
    if (!Array.isArray(m.checkin)) m.checkin = [];
    if (!Array.isArray(m.agenda)) m.agenda = [];
    if (!Array.isArray(m.fin)) m.fin = [];
    if (!Array.isArray(m.wins)) m.wins = [];
    if (!Array.isArray(m.learnings)) m.learnings = [];
    if (!Array.isArray(m.ai)) m.ai = [];
    if (!Array.isArray(m.decisions)) m.decisions = [];
    if (!Array.isArray(m.initiativeIds)) m.initiativeIds = [];
    if (!m.kpis) m.kpis = {sw:null,bu:null,pa:null,om:null};
    if (!m.outlook) m.outlook = {swappers:'',buyers:'',partners:'',offmarket:'',revenue:'',zurich:''};
    if (typeof m.finNarrative !== 'string') m.finNarrative = '';
    if (typeof m.cashRunway !== 'string') m.cashRunway = '';
    if (typeof m.nextMeeting !== 'string') m.nextMeeting = '';
    if (typeof m.notes !== 'string') m.notes = '';
    if (typeof m.attendees !== 'string') m.attendees = '';
  });
  db.reports.forEach(function(r){
    if (!Array.isArray(r.highlights)) r.highlights = [];
    if (!Array.isArray(r.lowlights)) r.lowlights = [];
    if (!Array.isArray(r.initiativeIds)) r.initiativeIds = [];
    if (!r.kpis) r.kpis = {sw:null,bu:null,pa:null,om:null};
    if (typeof r.notes !== 'string') r.notes = '';
  });
  return db;
}

/* ================= helpers ================= */
function esc(s){
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtCHF(n){
  if (n === null || n === undefined || isNaN(n)) return '—';
  var neg = n < 0; var s = String(Math.round(Math.abs(n)));
  s = s.replace(/\B(?=(\d{3})+(?!\d))/g, '’');
  return (neg ? '− ' : '') + 'CHF ' + s;
}
function fmtNum(n){ return (n === null || n === undefined || isNaN(n)) ? '' : String(n); }
function parseNum(el){
  var v = el.innerText.replace(/[^0-9\-\.]/g,'');
  return v === '' ? null : Math.round(parseFloat(v));
}
function byId(list, id){ for (var i=0;i<list.length;i++){ if (list[i].id === id) return list[i]; } return null; }
function newId(p){ return p + Date.now().toString(36) + Math.floor(Math.random()*99); }

var INIT_LABEL = {'proposed':'Proposed','active':'Active','at risk':'At risk','decision':'Decision pending','done':'Done'};
var INIT_CLASS = {'proposed':'mut','active':'disc','at risk':'neg','decision':'act','done':'pos'};
function initChip(st, cycleId){
  var cyc = (CAN_EDIT && cycleId) ? ' click" title="Click to change status" onclick="cycleInitStatus(\'' + cycleId + '\')' : '"';

}
var TAGS = ['inform','discuss','decide'];
function srcLabel(src){
  if (!src) return '';
  if (src.type === 'meeting'){ var m = byId(DB.meetings, src.id); return m ? 'Board meeting #' + m.number : ''; }
  if (src.type === 'report'){ var r = byId(DB.reports, src.id); return r ? 'Rapport ' + r.month : ''; }

}
function srcHref(src){
  if (!src) return '';

/* ================= financial chart ================= */
function finPoints(){
  var pts = [];
  DB.meetings.forEach(function(m){ (m.fin || []).forEach(function(f){
    if (f.revenue !== null || f.charges !== null) pts.push({label:f.label, revenue:f.revenue, charges:f.charges, proj:!!f.proj});
  });});
  DB.reports.forEach(function(r){
    if (r.revenue !== null || r.charges !== null) pts.push({label:r.month, revenue:r.revenue, charges:r.charges, proj:false});
  });
  return pts;
}
function chartSVG(pts){
  if (!pts.length) return '<div class="empty">No financial data yet — add figures in a board meeting or monthly rapport.</div>';
  var W = 660, H = 300, top = 40, base = 240;
  var max = 0;
  pts.forEach(function(p){ max = Math.max(max, p.revenue || 0, p.charges || 0); });
  if (max <= 0) max = 1;
  var scale = (base - top) / max;
  var n = pts.length;
  var group = Math.min(200, (W - 60) / n);
  var bw = Math.max(14, Math.min(34, group * 0.22));
  var s = '<svg viewBox="0 0 ' + W + ' ' + H + '" role="img" aria-label="Revenue and charges over time">';
  s += '<g stroke="#EFEDE7" stroke-width="1"><line x1="44" y1="' + top + '" x2="' + (W-20) + '" y2="' + top + '"/><line x1="44" y1="' + ((top+base)/2) + '" x2="' + (W-20) + '" y2="' + ((top+base)/2) + '"/><line x1="44" y1="' + base + '" x2="' + (W-20) + '" y2="' + base + '"/></g>';
  s += '<g font-family="Inter,sans-serif" font-size="10" fill="#9AA0A4"><text x="38" y="' + (top+3) + '" text-anchor="end">' + Math.round(max/1000) + 'k</text><text x="38" y="' + ((top+base)/2+3) + '" text-anchor="end">' + Math.round(max/2000) + 'k</text><text x="38" y="' + (base+3) + '" text-anchor="end">0</text></g>';
  pts.forEach(function(p, i){
    var cx = 44 + group * i + group / 2;
    var ch = Math.round((p.charges || 0) * scale);
    var rh = Math.round((p.revenue || 0) * scale);
    var dash = p.proj ? ' fill-opacity=".45" stroke-dasharray="3 3"' : '';
    s += '<rect x="' + (cx - bw - 4) + '" y="' + (base - ch) + '" width="' + bw + '" height="' + ch + '" rx="3" fill="#C9C7BF"' + (p.proj ? dash + ' stroke="#9AA0A4"' : '') + '/>';
    s += '<rect x="' + (cx + 4) + '" y="' + (base - rh) + '" width="' + bw + '" height="' + rh + '" rx="3" fill="#1E7F4F"' + (p.proj ? dash + ' stroke="#1E7F4F"' : '') + '/>';
    var net = (p.revenue || 0) - (p.charges || 0);
    s += '<text x="' + cx + '" y="266" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" font-weight="500" fill="#1B1E20">' + esc(p.label) + (p.proj ? ' · proj.' : '') + '</text>';
    s += '<text x="' + cx + '" y="286" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="' + (net >= 0 ? '#1E7F4F' : '#C23934') + '">net ' + (net >= 0 ? '+' : '−') + Math.round(Math.abs(net)/100)/10 + 'k</text>';
  });
  s += '</svg>';
  return '<div class="chart-wrap"><div class="legend"><span><i style="background:#C9C7BF"></i>Charges</span><span><i style="background:#1E7F4F"></i>Revenue</span><span><i style="background:#fff;border:1px dashed #9AA0A4"></i>dashed = projection</span></div>' + s + '</div>';
}

  h += '<h3>Initiatives at a glance</h3><div class="card" style="padding:6px 20px"><table>';

}

/* ================= view: strategy on a page ================= */
function vStrategy(){

  h += '<h3>Decision rule</h3><div class="notes"' + ce() + ' data-ph="The rule every choice is tested against …" onblur="updStrategy(\'rule\',this)">' + esc(s.rule) + '</div>';

<script>
/* ================= view: meeting (full board pack) ================= */
function vMeeting(id){
  var m = byId(DB.meetings, id);
  if (!m) return notFound('#/meetings', 'Board meetings');
  var h = '<div class="crumb"><a href="#/meetings">← Board meetings</a></div>';

  h += '<div class="head-row"><div><div class="eyebrow">Board meeting · board pack</div>';
  h += '<h1>#<span' + ce() + ' onblur="updNum(\'meetings\',\'' + m.id + '\',\'number\',this)">' + m.number + '</span> · <span' + ce() + ' data-ph="date" onblur="upd(\'meetings\',\'' + m.id + '\',\'date\',this)">' + esc(m.date) + '</span></h1>';
  h += '<div class="small" style="margin-top:6px"><span' + ce() + ' data-ph="location" onblur="upd(\'meetings\',\'' + m.id + '\',\'location\',this)">' + esc(m.location) + '</span></div></div>';
  h += '<div style="display:flex;gap:8px;align-items:center"><span class="chip ' + (m.status === 'upcoming' ? 'act' : 'mut') + clk() + '"' + oc("toggleMeetingStatus('" + m.id + "')") + (CAN_EDIT ? ' title="Click to toggle"' : '') + '>' + (m.status === 'upcoming' ? 'Upcoming' : 'Held') + '</span>';
  h += E('<button class="ghost" title="Delete meeting" onclick="delEntity(\'meetings\',\'' + m.id + '\')">✕</button>') + '</div></div>';

  h += '<div class="field" style="margin-top:10px"><span class="k">Attendees</span><div' + ce() + ' data-ph="Names …" onblur="upd(\'meetings\',\'' + m.id + '\',\'attendees\',this)">' + esc(m.attendees) + '</div></div>';

  /* check-in */
  h += '<h3>Check-in</h3><div class="card">';
  if (m.checkin.length){
    m.checkin.forEach(function(c, i){
      var cls = c.status === 'done' ? 'pos' : (c.status === 'open' ? 'mut' : 'act');
      var lab = c.status === 'done' ? 'Done' : (c.status === 'open' ? 'Open' : c.status);
      h += '<div class="item"><span class="chip ' + cls + clk() + '"' + oc("cycleCheckin('" + m.id + "'," + i + ")") + '>' + lab + '</span>';
      h += '<div class="grow"' + ce() + ' data-ph="Item …" onblur="updCheckin(\'' + m.id + '\',' + i + ',this)">' + esc(c.t) + '</div>' + E('<button class="ghost" onclick="delCheckin(\'' + m.id + '\',' + i + ')">✕</button>') + '</div>';
    });
  } else { h += '<div class="empty">No check-in items.</div>'; }
  h += '</div>' + E('<div class="btnrow"><button onclick="addCheckin(\'' + m.id + '\')">+ Add check-in item</button></div>');

  /* agenda */
  h += '<h3>Agenda' + (CAN_EDIT ? ' <span class="small">— click a tag to cycle Inform → Discuss → Decide</span>' : '') + '</h3><div class="card">';
  if (m.agenda.length){
    m.agenda.forEach(function(a, i){
      h += '<div class="item"><span class="tag ' + a.tag + clk() + '"' + oc("cycleTag('" + m.id + "'," + i + ")") + '>' + a.tag + '</span>';
      h += '<div class="grow"' + ce() + ' data-ph="Agenda item …" onblur="updAgenda(\'' + m.id + '\',' + i + ',this)">' + esc(a.t) + '</div>';
      h += E('<button class="ghost" onclick="delAgenda(\'' + m.id + '\',' + i + ')">✕</button>') + '</div>';
    });
  } else { h += '<div class="empty">No agenda items yet.</div>'; }
  h += '</div>' + E('<div class="btnrow"><button onclick="addAgenda(\'' + m.id + '\')">+ Add agenda item</button></div>');

  /* financials */
  h += '<h3>Financials reported at this meeting</h3><div class="card" style="padding:6px 20px"><table><tr><th>Period</th><th class="t-right">Revenue</th><th class="t-right">Charges</th><th class="t-right">Net</th><th>Type</th>' + (CAN_EDIT ? '<th style="width:34px"></th>' : '') + '</tr>';
  (m.fin || []).forEach(function(f, i){
    var net = (f.revenue || 0) - (f.charges || 0);
    h += '<tr><td' + ce() + ' data-ph="Q… 20…" onblur="updFin(\'' + m.id + '\',' + i + ',\'label\',this,false)">' + esc(f.label) + '</td>';
    h += '<td class="t-right num"' + ce() + ' data-ph="—" onblur="updFin(\'' + m.id + '\',' + i + ',\'revenue\',this,true)">' + fmtNum(f.revenue) + '</td>';
    h += '<td class="t-right num"' + ce() + ' data-ph="—" onblur="updFin(\'' + m.id + '\',' + i + ',\'charges\',this,true)">' + fmtNum(f.charges) + '</td>';
    h += '<td class="t-right num" style="color:' + (net >= 0 ? 'var(--pos)' : 'var(--neg)') + '">' + fmtCHF(net) + '</td>';
    h += '<td><span class="chip ' + (f.proj ? 'act' : 'mut') + clk() + '"' + oc("toggleProj('" + m.id + "'," + i + ")") + '>' + (f.proj ? 'Projection' : 'Actual') + '</span></td>';
    h += E('<td><button class="ghost" onclick="delFin(\'' + m.id + '\',' + i + ')">✕</button></td>') + '</tr>';
  });
  h += '</table></div>' + E('<div class="btnrow"><button onclick="addFin(\'' + m.id + '\')">+ Add period</button></div>');
  h += '<div class="grid g2" style="margin-top:12px"><div class="card"><div class="eyebrow" style="margin-bottom:8px">Reading the numbers</div><div' + ce() + ' data-ph="One line on what the figures mean …" onblur="upd(\'meetings\',\'' + m.id + '\',\'finNarrative\',this)">' + esc(m.finNarrative) + '</div></div>';
  h += '<div class="card"><div class="eyebrow" style="margin-bottom:8px">Cash position & runway</div><div' + ce() + ' data-ph="CHF … cash at period end · … months runway …" onblur="upd(\'meetings\',\'' + m.id + '\',\'cashRunway\',this)">' + esc(m.cashRunway) + '</div></div></div>';

  /* KPI */
  h += '<h3>KPI snapshot</h3>' + kpiEditor('meetings', m.id, m.kpis);

  /* Q2 wins & learnings */
  h += '<h3>Wins</h3><div class="card">';
  if (m.wins.length){
    m.wins.forEach(function(w, i){
      h += '<div class="item"><span class="mark w">✓</span><div class="grow"' + ce() + ' data-ph="Win …" onblur="updMeetingList(\'' + m.id + '\',\'wins\',' + i + ',this)">' + esc(w) + '</div>' + E('<button class="ghost" onclick="delMeetingList(\'' + m.id + '\',\'wins\',' + i + ')">✕</button>') + '</div>';
    });
  } else { h += '<div class="empty">No wins recorded.</div>'; }
  h += '</div>' + E('<div class="btnrow"><button onclick="addMeetingList(\'' + m.id + '\',\'wins\')">+ Add win</button></div>');

  h += '<h3>Fails & learnings</h3><div class="card">';
  if (m.learnings.length){
    m.learnings.forEach(function(l, i){
      var it = l.initiativeId ? byId(DB.initiatives, l.initiativeId) : null;
      h += '<div class="learn"><div class="pair"><span class="mark f">✕</span><div style="flex:1;min-width:0">';
      h += '<div class="what"' + ce() + ' data-ph="What happened …" onblur="updLearn(\'' + m.id + '\',' + i + ',\'what\',this)">' + esc(l.what) + '</div>';
      h += '<div class="so"' + ce() + ' data-ph="So what / response …" onblur="updLearn(\'' + m.id + '\',' + i + ',\'so\',this)">' + esc(l.so) + '</div>';
      if (it) h += '<div class="link"><a href="#/initiatives/' + it.id + '">→ ' + esc(it.name) + '</a></div>';
      h += '</div>' + E('<button class="ghost" onclick="delLearn(\'' + m.id + '\',' + i + ')">✕</button>') + '</div>';
      if (CAN_EDIT){
        h += '<div class="small" style="margin:8px 0 0 30px">Linked initiative: <select onchange="setLearnInit(\'' + m.id + '\',' + i + ',this.value)" style="font:inherit;padding:3px 6px;border:1px solid var(--line);border-radius:6px">';
        h += '<option value="">— none —</option>';
        DB.initiatives.forEach(function(x){ h += '<option value="' + x.id + '"' + (x.id === l.initiativeId ? ' selected' : '') + '>' + esc(x.name) + '</option>'; });
        h += '</select></div>';
      }
      h += '</div>';
    });
  } else { h += '<div class="empty">No learnings recorded.</div>'; }
  h += '</div>' + E('<div class="btnrow"><button onclick="addLearn(\'' + m.id + '\')">+ Add learning</button></div>');

  /* outlook */
  h += '<h3>6-month outlook <span class="small">— targets for the next two quarters</span></h3><div class="grid g3">';
  [['swappers','Active Swappers','from 30'],['buyers','Active buyers','from 35'],['partners','Partner companies','from 14'],['offmarket','True off-market','from 4'],['revenue','Quarterly revenue','from 137k in Q2'],['zurich','Zurich milestone','per Zurich plan']].forEach(function(o){
    h += '<div class="card kpi"><div class="lab">' + o[1] + '</div><div class="val"' + ce() + ' data-ph="…" onblur="updOutlook(\'' + m.id + '\',\'' + o[0] + '\',this)">' + esc(m.outlook[o[0]] || '') + '</div><div class="sub">' + o[2] + '</div></div>';
  });
  h += '</div>';

  /* automation & AI */
  h += '<h3>Automation & AI</h3><div class="card" style="padding:6px 20px"><table><tr><th style="width:26%">Workstream</th><th>What it does</th><th style="width:18%">Status</th>' + (CAN_EDIT ? '<th style="width:34px"></th>' : '') + '</tr>';
  if (m.ai.length){
    m.ai.forEach(function(a, i){
      h += '<tr><td><b' + ce() + ' data-ph="Name …" onblur="updAi(\'' + m.id + '\',' + i + ',\'name\',this)">' + esc(a.name) + '</b></td>';
      h += '<td class="small" style="color:var(--ink)"' + ce() + ' data-ph="What it does …" onblur="updAi(\'' + m.id + '\',' + i + ',\'what\',this)">' + esc(a.what) + '</td>';
      h += '<td' + ce() + ' data-ph="status …" onblur="updAi(\'' + m.id + '\',' + i + ',\'status\',this)">' + esc(a.status) + '</td>';
      h += E('<td><button class="ghost" onclick="delAi(\'' + m.id + '\',' + i + ')">✕</button></td>') + '</tr>';
    });
  } else { h += '<tr><td class="empty" colspan="4">No workstreams yet.</td></tr>'; }
  h += '</table></div>' + E('<div class="btnrow"><button onclick="addAi(\'' + m.id + '\')">+ Add workstream</button></div>');

  /* decisions */
  h += '<h3>Decisions</h3><div class="card">';
  if (m.decisions.length){
    m.decisions.forEach(function(d, i){
      h += '<div class="item"><span class="small num" style="min-width:18px">' + (i + 1) + '.</span>';
      h += '<div class="grow"' + ce() + ' data-ph="Decision …" onblur="updDecision(\'' + m.id + '\',' + i + ',this)">' + esc(d) + '</div>';
      h += E('<button class="ghost" onclick="delDecision(\'' + m.id + '\',' + i + ')">✕</button>') + '</div>';
    });
  } else { h += '<div class="empty">No decisions recorded' + (m.status === 'upcoming' ? ' — capture them live during the meeting.' : '.') + '</div>'; }
  h += '</div>' + E('<div class="btnrow"><button onclick="addDecision(\'' + m.id + '\')">+ Add decision</button></div>');

  /* tasks / actions */
  h += '<h3>Actions & to-dos</h3><div class="card">';
  var ts = tasksFor('meeting', m.id);
  if (ts.length){ ts.forEach(function(t){ h += taskRow(t, false); }); } else { h += '<div class="empty">No tasks yet.</div>'; }
  h += '</div>' + E('<div class="btnrow"><button onclick="addTask(\'meeting\',\'' + m.id + '\')">+ Add action</button></div>');

  /* related initiatives */
  h += '<h3>Related initiatives' + (CAN_EDIT ? ' <span class="small">— click to link / unlink</span>' : '') + '</h3>' + initiativeToggles('meetings', m.id, m.initiativeIds);

  /* notes */
  h += '<h3>Notes</h3><div class="notes"' + ce() + ' data-ph="Meeting notes …" onblur="upd(\'meetings\',\'' + m.id + '\',\'notes\',this)">' + esc(m.notes) + '</div>';

  /* next meeting + export */
  h += '<h3>Next steps & check-out</h3><div class="card" style="padding:6px 20px"><table><tr><td style="width:34%">Next board meeting</td><td' + ce() + ' data-ph="date · place" onblur="upd(\'meetings\',\'' + m.id + '\',\'nextMeeting\',this)">' + esc(m.nextMeeting) + '</td></tr></table></div>';
  h += '<div class="btnrow"><button class="g" onclick="exportMinutes(\'' + m.id + '\')">Export minutes (.txt)</button><button class="g" onclick="window.print()">Print pack</button></div>';
  return h;
}

function vReport(id){
  var r = byId(DB.reports, id);
  if (!r) return notFound('#/reports', 'Monthly rapports');
  var h = '<div class="crumb"><a href="#/reports">← Monthly rapports</a></div>';
  h += '<div class="head-row"><div><div class="eyebrow">Monthly rapport</div>';
  h += '<h1><span' + ce() + ' data-ph="Month YYYY" onblur="upd(\'reports\',\'' + r.id + '\',\'month\',this)">' + esc(r.month) + '</span></h1></div>';

  h += '<div class="grid g2" style="margin-top:14px">';
  h += '<div class="card kpi"><div class="lab">Revenue</div><div class="val num"' + ce() + ' data-ph="—" onblur="updNumField(\'reports\',\'' + r.id + '\',\'revenue\',this)">' + fmtNum(r.revenue) + '</div><div class="sub">CHF, this month</div></div>';
  h += '<div class="card kpi"><div class="lab">Charges</div><div class="val num"' + ce() + ' data-ph="—" onblur="updNumField(\'reports\',\'' + r.id + '\',\'charges\',this)">' + fmtNum(r.charges) + '</div><div class="sub">CHF, this month</div></div>';
  h += '</div>';

  h += '<h3>KPI snapshot</h3>' + kpiEditor('reports', r.id, r.kpis);

  h += '<h3>Highlights</h3>' + listEditor(r, 'highlights', 'Highlight …');
  h += '<h3>Lowlights</h3>' + listEditor(r, 'lowlights', 'Lowlight …');

  h += '<h3>Tasks from this rapport</h3><div class="card">';
  var ts = tasksFor('report', r.id);
  if (ts.length){ ts.forEach(function(t){ h += taskRow(t, false); }); } else { h += '<div class="empty">No tasks yet.</div>'; }
  h += '</div>' + E('<div class="btnrow"><button onclick="addTask(\'report\',\'' + r.id + '\')">+ Add task</button></div>');

  h += '<h3>Related initiatives' + (CAN_EDIT ? ' <span class="small">— click to link / unlink</span>' : '') + '</h3>' + initiativeToggles('reports', r.id, r.initiativeIds);
  h += '<h3>Notes</h3><div class="notes"' + ce() + ' data-ph="Notes …" onblur="upd(\'reports\',\'' + r.id + '\',\'notes\',this)">' + esc(r.notes) + '</div>';
  return h;
}

function vInitiative(id){
  var it = byId(DB.initiatives, id);
  if (!it) return notFound('#/initiatives', 'Strategic initiatives');
  var h = '<div class="crumb"><a href="#/initiatives">← Strategic initiatives</a></div>';
  h += '<div class="head-row"><div><div class="eyebrow">Strategic initiative</div>';
  h += '<h1><span' + ce() + ' data-ph="Initiative name" onblur="upd(\'initiatives\',\'' + it.id + '\',\'name\',this)">' + esc(it.name) + '</span></h1>';
  h += '<div class="small" style="margin-top:6px">Owner: <span' + ce() + ' data-ph="—" onblur="upd(\'initiatives\',\'' + it.id + '\',\'owner\',this)">' + esc(it.owner) + '</span></div></div>';
  h += '<div style="display:flex;gap:8px;align-items:center">' + initChip(it.status, it.id);
  h += E('<button class="ghost" title="Delete initiative" onclick="delEntity(\'initiatives\',\'' + it.id + '\')">✕</button>') + '</div></div>';

  h += '<div class="notes"' + ce() + ' data-ph="What this initiative is and why it matters …" onblur="upd(\'initiatives\',\'' + it.id + '\',\'summary\',this)">' + esc(it.summary) + '</div>';

  var meets = DB.meetings.filter(function(m){ return m.initiativeIds.indexOf(it.id) >= 0; });
  var reps  = DB.reports.filter(function(r){ return r.initiativeIds.indexOf(it.id) >= 0; });

  h += '<h3>History — where this initiative appears</h3><div class="card" style="padding:6px 20px"><table>';
  if (meets.length + reps.length){
    meets.forEach(function(m){
      h += '<tr class="rowlink" onclick="go(\'#/meetings/' + m.id + '\')"><td class="rowtitle">Board meeting #' + m.number + '</td><td class="num">' + esc(m.date) + '</td><td class="t-right"><span class="chip ' + (m.status === 'upcoming' ? 'act' : 'mut') + '">' + (m.status === 'upcoming' ? 'Upcoming' : 'Held') + '</span></td></tr>';
    });
    reps.forEach(function(r){
      h += '<tr class="rowlink" onclick="go(\'#/reports/' + r.id + '\')"><td class="rowtitle">Rapport ' + esc(r.month) + '</td><td></td><td class="t-right"><span class="chip mut">Rapport</span></td></tr>';
    });
  } else { h += '<tr><td class="empty">Not linked from any meeting or rapport yet.</td></tr>'; }
  h += '</table></div>';

  var direct = tasksFor('initiative', it.id);
  var inherited = DB.tasks.filter(function(t){
    if (!t.src) return false;
    if (t.src.type === 'meeting'){ var m = byId(DB.meetings, t.src.id); return m && m.initiativeIds.indexOf(it.id) >= 0; }
    if (t.src.type === 'report'){ var r = byId(DB.reports, t.src.id); return r && r.initiativeIds.indexOf(it.id) >= 0; }
    return false;
  });
  h += '<h3>Tasks</h3><div class="card">';
  if (direct.length + inherited.length){
    direct.forEach(function(t){ h += taskRow(t, false); });
    inherited.forEach(function(t){ h += taskRow(t, true); });
  } else { h += '<div class="empty">No tasks on this initiative yet.</div>'; }
  h += '</div>' + E('<div class="btnrow"><button onclick="addTask(\'initiative\',\'' + it.id + '\')">+ Add task</button></div>');
  h += '<p class="small" style="margin-top:8px">Tasks from linked meetings and rapports appear here automatically.</p>';
  return h;
}

function notFound(back, label){
  return '<div class="crumb"><a href="' + back + '">← ' + label + '</a></div><div class="empty">This entry no longer exists.</div>';
}

/* ---------- small editors ---------- */
function kpiEditor(kind, id, k){
  var h = '<div class="grid g4">';
  h += kpiCell(kind, id, 'sw', 'Active Swappers', k.sw);
  h += kpiCell(kind, id, 'bu', 'Active buyers', k.bu);
  h += kpiCell(kind, id, 'pa', 'Partner companies', k.pa);
  h += kpiCell(kind, id, 'om', 'True off-market', k.om);
  h += '</div>';
  return h;
}
function kpiCell(kind, id, key, lab, val){
  return '<div class="card kpi"><div class="lab">' + lab + '</div><div class="val num"' + ce() + ' data-ph="—" onblur="updKpi(\'' + kind + '\',\'' + id + '\',\'' + key + '\',this)">' + fmtNum(val) + '</div></div>';
}
function listEditor(r, field, ph){
  var h = '<div class="card">';
  if (r[field].length){
    r[field].forEach(function(v, i){
      h += '<div class="item"><span class="small">•</span><div class="grow"' + ce() + ' data-ph="' + ph + '" onblur="updList(\'' + r.id + '\',\'' + field + '\',' + i + ',this)">' + esc(v) + '</div>';
      h += E('<button class="ghost" onclick="delList(\'' + r.id + '\',\'' + field + '\',' + i + ')">✕</button>') + '</div>';
    });
  } else { h += '<div class="empty">Nothing yet.</div>'; }
  h += '</div>' + E('<div class="btnrow"><button onclick="addList(\'' + r.id + '\',\'' + field + '\')">+ Add</button></div>');
  return h;
}
</script>

<script>
/* ================= mutations (all guarded by CAN_EDIT) ================= */
function go(hash){ location.hash = hash; }

function upd(kind, id, field, el){ if(!CAN_EDIT) return; var e = byId(DB[kind], id); if (!e) return; e[field] = el.innerText.trim(); persistSoon(); }
function updNum(kind, id, field, el){ if(!CAN_EDIT) return; var e = byId(DB[kind], id); if (!e) return; var v = parseNum(el); e[field] = v === null ? e[field] : v; persistSoon(); }
function updNumField(kind, id, field, el){ if(!CAN_EDIT) return; var e = byId(DB[kind], id); if (!e) return; e[field] = parseNum(el); persistSoon(); }
function updKpi(kind, id, key, el){ if(!CAN_EDIT) return; var e = byId(DB[kind], id); if (!e) return; e.kpis[key] = parseNum(el); persistSoon(); }

/* strategy */

/* ================= minutes export ================= */
function exportMinutes(mid){
  var m = byId(DB.meetings, mid); if (!m) return;
  var L = [];
  L.push('Minutes of the Board Meeting of Immo-Ressource AG, registered seat 1700 Fribourg');
  L.push('Meeting #' + m.number + ' — ' + m.date + (m.location ? ', ' + m.location : ''));
  L.push('');
  if (m.attendees){ L.push('Attendees: ' + m.attendees + '.'); L.push(''); }
  if (m.checkin.length){
    L.push('Check-in: ' + m.checkin.map(function(c){ return c.t + ': ' + (c.status === 'done' ? 'done' : 'open'); }).join('; ') + '.');
    L.push('');
  }
  if (m.fin.length){
    L.push('Financials: ' + m.fin.map(function(f){
      var net = (f.revenue || 0) - (f.charges || 0);
      return f.label + ' net ' + fmtCHF(net) + ' (rev ' + fmtCHF(f.revenue) + ' / charges ' + fmtCHF(f.charges) + ')' + (f.proj ? ' [projection]' : '');
    }).join('; ') + '.');
    L.push('');
  }
  L.push('DECISIONS');
  if (m.decisions.length){ m.decisions.forEach(function(d, i){ if (d.trim()) L.push((i + 1) + '. ' + d); }); }
  else { L.push('(none recorded)'); }
  L.push('');
  L.push('ACTIONS & TO-DOS');
  var acts = tasksFor('meeting', m.id);
  if (acts.length){ acts.forEach(function(t, i){ L.push((i + 1) + '. ' + (t.text || '(no description)') + (t.owner ? ' — ' + t.owner : '') + (t.due ? ' — due ' + t.due : '') + (t.done ? ' [done]' : '')); }); }
  else { L.push('(none recorded)'); }
  L.push('');
  L.push('Next board meeting: ' + (m.nextMeeting || '(to be scheduled)'));
  L.push('');
  L.push('');
  L.push('___________________________');
  L.push((m.location ? m.location.split(',')[0] + ', ' : '') + m.date + ' — Daniel Abebe, Chairperson');
  L.push('');
  L.push('___________________________');
  L.push((m.location ? m.location.split(',')[0] + ', ' : '') + m.date + ' — Board member');
  var blob = new Blob([L.join('\n')], {type:'text/plain;charset=utf-8'});
  download(blob, 'Minutes-Board-Meeting-' + m.number + '.txt');
  toast('Minutes exported');
}

/* ================= export / import ================= */
function exportData(){
  var d = new Date();
  var name = 'Casarico-Board-Hub-data-' + d.toISOString().slice(0, 10) + '.json';
  var blob = new Blob([JSON.stringify(DB, null, 2)], {type:'application/json'});
  download(blob, name);
  toast('Data exported');
}
function importData(input){
  if(!CAN_EDIT) return;
  var file = input.files && input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(){
    try{
      var data = JSON.parse(reader.result);
      if (!data || !Array.isArray(data.initiatives) || !Array.isArray(data.meetings) || !Array.isArray(data.reports) || !Array.isArray(data.tasks)) throw new Error('bad');
      if (!confirm('Replace all current data with the imported file?')){ input.value = ''; return; }
      DB = normalize(data); persistSoon(); render(); toast('Data imported');
    }catch(e){ toast('Import failed — not a valid Board Hub file'); }
    input.value = '';
  };
  reader.readAsText(file);
}
function download(blob, name){
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = name;
  document.body.appendChild(a); a.click();
  setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); }, 500);
}

/* ================= toast, router, chrome ================= */
function toast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(function(){ t.classList.remove('show'); }, 1800);
}
window.toast = toast;
function focusNewest(sel){
  setTimeout(function(){
    var els = document.querySelectorAll(sel);
    if (els.length) els[els.length - 1].focus();
  }, 0);
}
function route(){
  var h = location.hash.replace(/^#\/?/, '');
  var parts = h.split('/');
  return {view: parts[0] || 'analytics', id: parts[1] || null};
}
function render(){
  if (!DB) return;
  var r = route();
  document.querySelectorAll('#nav a').forEach(function(a){
    a.classList.toggle('on', a.getAttribute('data-v') === r.view);
  });
  var el = document.getElementById('app');
  if (r.view === 'reports') el.innerHTML = r.id ? vReport(r.id) : vReports();
  else if (r.view === 'meetings') el.innerHTML = r.id ? vMeeting(r.id) : vMeetings();
  else if (r.view === 'initiatives') el.innerHTML = r.id ? vInitiative(r.id) : vInitiatives();
  else if (r.view === 'strategy') el.innerHTML = vStrategy();
  else el.innerHTML = vAnalytics();
}
function rerender(){ var y = window.scrollY; render(); window.scrollTo(0, y); }
window.addEventListener('hashchange', function(){ render(); window.scrollTo(0, 0); });

function updateChrome(){
  var role = document.getElementById('roleBox');
  var editorTools = document.getElementById('editorTools');
  var signOutBtn = document.getElementById('signOutBtn');
  if (STORAGE_MODE === 'firebase'){
    role.style.display = 'flex';
    role.className = 'role ' + (CAN_EDIT ? 'editor' : 'viewer');
    role.innerHTML = '<span class="dot"></span><span class="who">' + esc((USER && (USER.email || USER.displayName)) || '') + '</span><span style="margin-left:auto;color:var(--muted)">' + (CAN_EDIT ? 'Editor' : 'Viewer') + '</span>';
    signOutBtn.style.display = 'block';
  } else {
    role.style.display = 'flex';
    role.className = 'role ' + (CAN_EDIT ? 'editor' : 'viewer');
    role.innerHTML = '<span class="dot"></span><span class="who">Local</span><span style="margin-left:auto;color:var(--muted)">' + (CAN_EDIT ? 'Editor' : 'Viewer') + '</span>';
    signOutBtn.style.display = 'none';
  }
  editorTools.style.display = CAN_EDIT ? 'block' : 'none';
  updateSaveBadge();
}

function showApp(){
  document.getElementById('gate').style.display = 'none';
  document.getElementById('side').style.display = '';
  document.getElementById('app').style.display = '';
  if (!location.hash) history.replaceState(null, '', '#/analytics');
  updateChrome();
  render();
}
function showGate(msg, note){
  document.getElementById('side').style.display = 'none';
  document.getElementById('app').style.display = 'none';
  document.getElementById('gate').style.display = 'flex';
  if (msg) document.getElementById('gateMsg').textContent = msg;
  document.getElementById('gateNote').textContent = note || '';
}

/* ================= boot ================= */
function bootLocal(){
  if (_booted) return;   // already running (firebase took over, or already booted local)
  _booted = true;
  STORAGE_MODE = 'memory';
  var stored = null;
  try{
    stored = localStorage.getItem(KEY);
    STORAGE_MODE = 'local';
  }catch(e){ STORAGE_MODE = 'memory'; }
  DB = stored ? normalize(JSON.parse(stored)) : seedDB();
  recomputeRole();
  if (!stored && CAN_EDIT) persist();
  showApp();
}

/* firebase callbacks (invoked from the module below) */
window.onFirebaseReady = function(){
  _booted = true;
  STORAGE_MODE = 'firebase';
};
window.onAuthChange = function(u){
  USER = u || null;
  recomputeRole();
  if (!USER){ showGate('This board is private. Sign in to view.', 'Only ' + window.EDITOR_EMAILS.join(', ') + ' can edit; everyone else joins as a viewer.'); return; }
  if (DB){ showApp(); }
  else { showGate('Loading the board…', ''); }
};
window.onRemoteData = function(payload){
  if (payload && payload.data){
    try{ DB = normalize(JSON.parse(payload.data)); }catch(e){ DB = DB || seedDB(); }
  } else if (!DB){
    DB = seedDB();
    if (CAN_EDIT) persist();   // editor initialises the shared board on first run
  }
  if (USER){ showApp(); }
};
window.onRemoteError = function(err){
  toast('Cloud read error — check Firestore rules');
};
window.onFirebaseAbsent = function(){ bootLocal(); };

function fbSignIn(){ if (window.fb && window.fb.signIn) window.fb.signIn(); else bootLocal(); }
function fbSignOut(){ if (window.fb && window.fb.signOut) window.fb.signOut(); }

/* If Firebase is not configured, run locally right away.
   If it IS configured, give the module time to load; fall back to local only if it never initialises. */
if (!fbConfigured){
  bootLocal();
} else {
  showGate('Connecting…', '');
  setTimeout(function(){ if (STORAGE_MODE !== 'firebase'){ toast('Cloud unavailable — running locally'); bootLocal(); } }, 6000);
}
</script>

<!-- Firebase (shared mode). Loads only when configured; otherwise this module no-ops. -->
<script type="module">
  const c = window.FIREBASE_CONFIG;
  const configured = !!(c && c.apiKey && c.apiKey.indexOf('PASTE') < 0);
  if (configured){
    try{
      const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js');
      const { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } = await import('https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js');
      const { getFirestore, doc, onSnapshot, setDoc } = await import('https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js');
      const app = initializeApp(c);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const ref = doc(db, window.BOARD_COLLECTION || 'boards', window.BOARD_ID || 'casarico');
      window.fb = {
        signIn: function(){ return signInWithPopup(auth, new GoogleAuthProvider()).catch(function(e){ window.toast && window.toast('Sign-in failed'); }); },
        signOut: function(){ return signOut(auth); },
        save: function(data){ return setDoc(ref, { data: JSON.stringify(data), updatedBy: (auth.currentUser && auth.currentUser.email) || '' }).catch(function(e){ window.toast && window.toast('Save failed — check permissions'); }); }
      };
      window.onFirebaseReady && window.onFirebaseReady();
      onAuthStateChanged(auth, function(u){ window.onAuthChange && window.onAuthChange(u); });
      onSnapshot(ref, function(snap){ window.onRemoteData && window.onRemoteData(snap.exists() ? snap.data() : null); },
                       function(err){ window.onRemoteError && window.onRemoteError(err); });
    }catch(e){
      window.onFirebaseAbsent && window.onFirebaseAbsent();
    }
  } else {
    window.onFirebaseAbsent && window.onFirebaseAbsent();
  }
</script>
