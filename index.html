<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Casarico</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Newsreader:opsz,wght@6..72,500;6..72,600&display=swap');

:root{
  --bg:#FAFAF7;
  --surface:#FFFFFF;
  --ink:#1B1E20;
  --muted:#6C7176;
  --faint:#9AA0A4;
  --line:#E8E6DF;
  --line-soft:#F0EEE8;
  --pos:#1E7F4F;
  --pos-bg:#EAF5EF;
  --neg:#C23934;
  --neg-bg:#FBEFEE;
  --act:#9A5B00;          /* action required: Decide tags + fields to complete */
  --act-bg:#FBF3E6;
  --disc:#2E5AAC;         /* discuss */
  --disc-bg:#EEF3FB;
  --radius:10px;
  --side:232px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--ink);
  font:400 15px/1.65 Inter,-apple-system,"Segoe UI",sans-serif;
  -webkit-font-smoothing:antialiased;
}
::selection{background:#E8E2D2}

/* ---------- layout ---------- */
.side{
  position:fixed;inset:0 auto 0 0;width:var(--side);
  border-right:1px solid var(--line);background:var(--bg);
  padding:28px 20px 20px;display:flex;flex-direction:column;gap:18px;
  overflow-y:auto;
}
.main{margin:0 auto;padding:56px 64px 120px;max-width:920px}
section{scroll-margin-top:28px;padding:44px 0;border-top:1px solid var(--line)}
section:first-of-type{border-top:none;padding-top:0}
body.onpage main.main{padding-top:68px}

/* ---------- sidebar ---------- */
.brand{font:600 15px/1.3 Inter;letter-spacing:-.01em}
.brand small{display:block;font:400 11.5px/1.5 Inter;color:var(--muted);margin-top:2px}
.nav{display:flex;flex-direction:column;gap:1px;font-size:13px}
.nav a{
  color:var(--muted);text-decoration:none;padding:5px 8px;border-radius:6px;
  display:flex;align-items:baseline;gap:8px;
}
.nav a:hover{color:var(--ink);background:var(--line-soft)}
.nav a.on{color:var(--ink);background:var(--line-soft);font-weight:500}
.nav .n{font:500 10px/1 Inter;color:var(--faint);min-width:14px}
.nav-group{font:500 10.5px/1 Inter;text-transform:uppercase;letter-spacing:.09em;color:var(--faint);margin:12px 8px 4px}
.side-foot{margin-top:auto;font-size:11.5px;color:var(--faint);line-height:1.6}
.side-foot button{margin-top:8px}

/* ---------- typography ---------- */
.eyebrow{font:500 11px/1 Inter;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px}
h1{font:500 34px/1.15 Newsreader,Georgia,serif;letter-spacing:-.01em;margin-bottom:6px}
h2{font:500 25px/1.2 Newsreader,Georgia,serif;letter-spacing:-.005em;margin-bottom:4px}
h3{font:600 14px/1.4 Inter;margin:26px 0 10px}
.lede{color:var(--muted);max-width:620px}
.sec-head{display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:22px}
.sec-head .lede{margin-top:4px}
p+p{margin-top:10px}
.small{font-size:12.5px;color:var(--muted)}

/* ---------- tags & chips ---------- */
.tag{display:inline-block;font:500 10.5px/1 Inter;text-transform:uppercase;letter-spacing:.07em;
  padding:4px 8px;border-radius:99px;white-space:nowrap}
.tag.inform{background:var(--line-soft);color:var(--muted)}
.tag.discuss{background:var(--disc-bg);color:var(--disc)}
.tag.decide{background:var(--act-bg);color:var(--act)}
.chip{display:inline-block;font:500 12px/1 Inter;padding:4px 9px;border-radius:99px}
.chip.pos{background:var(--pos-bg);color:var(--pos)}
.chip.neg{background:var(--neg-bg);color:var(--neg)}
.chip.mut{background:var(--line-soft);color:var(--muted)}
.tagset{display:flex;gap:6px;align-items:center}

/* ---------- cards & grids ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.kpi .lab{font:500 11px/1 Inter;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.kpi .val{font:500 26px/1.2 Newsreader,Georgia,serif;margin-top:8px;font-variant-numeric:tabular-nums}
.kpi .sub{font-size:12.5px;color:var(--muted);margin-top:4px}

/* ---------- tables ---------- */
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{font:500 11px/1 Inter;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);
  text-align:left;padding:0 12px 8px 0;border-bottom:1px solid var(--line)}
td{padding:9px 12px 9px 0;border-bottom:1px solid var(--line-soft);vertical-align:top}
tr:last-child td{border-bottom:none}
td .num,.num{font-variant-numeric:tabular-nums}
.t-right{text-align:right}

/* ---------- agenda ---------- */
.agenda td:first-child{color:var(--muted);width:24px}
.agenda .time{width:66px;color:var(--muted);font-variant-numeric:tabular-nums}
.agenda a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--line)}
.agenda a:hover{border-color:var(--muted)}

/* ---------- memo blocks ---------- */
.memo{display:grid;grid-template-columns:130px 1fr;gap:8px 24px;margin-top:18px}
.memo .k{font:500 11px/1.9 Inter;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding-top:2px}
.memo .v{min-width:0}
.memo .v ul{padding-left:18px}
.memo .v li{margin:3px 0}
.memo .v li::marker{color:var(--faint)}
.ask{
  margin-top:20px;background:var(--act-bg);border:1px solid #EBD9BC;border-radius:var(--radius);
  padding:14px 18px;display:flex;gap:12px;align-items:baseline;
}
.ask .k{font:600 11px/1.7 Inter;text-transform:uppercase;letter-spacing:.08em;color:var(--act);white-space:nowrap}

/* ---------- decision & action capture ---------- */
.cap-h{display:none;font:600 13.5px/1.4 Inter;margin:26px 0 6px}
body.canedit .cap-h,.cap.has-items .cap-h{display:block}
.cap-item{display:flex;gap:10px;align-items:baseline;padding:8px 0;border-bottom:1px solid var(--line-soft)}
.cap-item:last-child{border-bottom:none}
.cap-item .cap-text{flex:1;min-width:0}
.cap-item .chip{flex:none}
.cap-del{display:none}
body.canedit .cap-del{display:inline-block}
.btnrow.add-cap,.add-cap{display:none}
body.canedit .btnrow.add-cap,body.canedit .add-cap{display:flex}
.cap-src{color:var(--muted);text-decoration:none;border-bottom:1px solid var(--line);font-size:12px;white-space:nowrap}
.cap-src:hover{color:var(--ink)}
.cap .cap-card{display:none}
body.canedit .cap .cap-card,.cap.has-items .cap-card{display:block}
.st-row{display:flex;justify-content:space-between;gap:12px;font-size:12.5px;padding:4px 0;border-bottom:1px solid var(--line-soft)}
.st-row:last-child{border-bottom:none}
.st-row span{color:var(--muted)}
.st-row b{font-weight:500;font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap}
.st-row.hl b{font-weight:600}
@media print{.add-cap,.cap-del{display:none!important}}

/* ---------- buy-back page ---------- */
.score{display:grid;grid-template-columns:150px 1fr 40px;gap:10px;align-items:center;padding:5px 0;font-size:13px}
.score .bar{height:10px;border-radius:99px;background:var(--line-soft);overflow:hidden}
.score .bar i{display:block;height:100%;border-radius:99px;background:#C9C7BF}
.score.win .bar i{background:var(--pos)}
.score.win{font-weight:600}
.score .pts{text-align:right;color:var(--muted);font-variant-numeric:tabular-nums}
.bb-input{font:500 15px/1 Inter;font-variant-numeric:tabular-nums;width:140px;padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink)}
.bb-input:focus{outline:none;border-color:#E4D3AE;background:#FFFDF5}
.bb-tabs{display:flex;gap:6px;margin:16px 0 10px;flex-wrap:wrap}
.bb-tab{font:500 12.5px/1 Inter;padding:8px 13px;border-radius:99px;border:1px solid var(--line);background:#fff;cursor:pointer;color:var(--muted)}
.bb-tab.on{background:var(--ink);border-color:var(--ink);color:#fff}
.wf{font-size:13.5px}
.wf td{padding:7px 12px 7px 0}
.wf .t-right{font-variant-numeric:tabular-nums}
.wf tr.total td{border-top:1px solid var(--line);border-bottom:none;font-weight:600}
.struct{display:flex;justify-content:center;padding:6px 0}
.struct svg{max-width:660px;width:100%;height:auto}

/* ---------- editable fills ---------- */
[contenteditable]{outline:none;border-radius:6px}
[contenteditable]:hover{background:var(--line-soft)}
[contenteditable]:focus{background:#FFFDF5;box-shadow:0 0 0 1px #E4D3AE}
.fill{
  border:1px dashed #D9C89F;background:#FEFBF4;border-radius:8px;
  padding:10px 14px;color:var(--ink);
}
.fill:empty::before,.fill .hint{color:#A98F55}
.fill .hint{font-style:italic}
.todo{display:inline-block;font:600 10px/1 Inter;letter-spacing:.07em;text-transform:uppercase;
  color:var(--act);background:var(--act-bg);border-radius:99px;padding:3px 8px;margin-left:8px;vertical-align:2px}

/* ---------- win / learn cards ---------- */
.mark{display:inline-flex;width:20px;height:20px;border-radius:99px;align-items:center;justify-content:center;
  font:600 11px/1 Inter;flex:none;margin-top:1px}
.mark.w{background:var(--pos-bg);color:var(--pos)}
.mark.f{background:var(--neg-bg);color:var(--neg)}
.pair{display:flex;gap:10px}
.learn{border-left:2px solid var(--line);padding:2px 0 2px 16px;margin:14px 0}
.learn .what{font-weight:500}
.learn .so{color:var(--muted);font-size:13.5px;margin-top:3px}
.learn .link{font-size:12.5px;margin-top:6px}
.learn .link a{color:var(--act);text-decoration:none;border-bottom:1px solid #E4CFA3}

/* ---------- chart ---------- */
.chart-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px 20px 10px;margin-top:12px}
.chart-wrap svg{width:100%;height:auto;display:block}
.legend{display:flex;gap:18px;font-size:12px;color:var(--muted);padding:6px 2px 8px}
.legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:6px;vertical-align:-1px}

/* ---------- flywheel ---------- */
.fly{display:flex;justify-content:center;padding:10px 0 4px}
.fly svg{max-width:520px;width:100%;height:auto}
.fly text{font:500 12.5px Inter;fill:var(--ink)}
.fly .step-n{font:600 10px Inter;fill:var(--faint)}

/* ---------- buttons ---------- */
button{
  font:500 13px/1 Inter;color:var(--ink);background:var(--surface);
  border:1px solid var(--line);border-radius:8px;padding:9px 14px;cursor:pointer;
}
button:hover{border-color:var(--muted)}
button.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
button.ghost{border:none;background:none;color:var(--muted);padding:4px 6px}
button.ghost:hover{color:var(--neg)}
.btnrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}

/* ---------- toast ---------- */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translate(-50%,8px);opacity:0;
  background:var(--ink);color:#fff;font:500 13px/1 Inter;padding:11px 16px;border-radius:99px;
  transition:.25s;pointer-events:none;z-index:50;
}
#toast.show{opacity:1;transform:translate(-50%,0)}

/* ---------- print ---------- */
@media print{
  .side,.btnrow,.ghost,#toast{display:none!important}
  .main{margin:0;padding:0;max-width:none}
  body{background:#fff;font-size:12px}
  section{page-break-inside:avoid;padding:24px 0}
  .card,.chart-wrap{border-color:#ddd}
  .fill{background:#fff}
}

/* ---------- mobile ---------- */
@media (max-width:900px){
  .side{position:sticky;top:0;inset:auto;width:100%;flex-direction:row;align-items:center;
    gap:12px;padding:10px 16px;border-right:none;border-bottom:1px solid var(--line);z-index:40;
    overflow-x:auto;white-space:nowrap}
  .side .brand small,.side-foot,.nav-group{display:none}
  .nav{flex-direction:row;gap:2px}
  .nav .n{display:none}
  .main{margin:0;padding:32px 20px 80px}
  .g2,.g3{grid-template-columns:1fr}
  .memo{grid-template-columns:1fr;gap:2px 0}
  .memo .k{margin-top:12px}
  section{scroll-margin-top:70px}
}

/* ---------- inline editor ---------- */
#editbar{position:fixed;right:18px;bottom:18px;z-index:90;display:flex;gap:8px;align-items:center}
#editbar button{box-shadow:0 2px 12px rgba(0,0,0,.14)}
#fmtbar{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:90;display:none;gap:3px;
  background:var(--ink);padding:6px;border-radius:12px;box-shadow:0 6px 22px rgba(0,0,0,.28)}
#fmtbar button{background:transparent;border:none;color:#fff;padding:8px 11px;border-radius:8px;font:600 13px/1 Inter;box-shadow:none}
#fmtbar button:hover{background:rgba(255,255,255,.16);border-color:transparent}
#fmtbar .sep{width:1px;background:rgba(255,255,255,.22);margin:3px 2px}
body.editmode main.main{outline:2px dashed #E4D3AE;outline-offset:10px;border-radius:6px}
body.editmode section{position:relative}
.sec-del{position:absolute;top:12px;right:0;background:var(--neg-bg);color:var(--neg);border:none;
  border-radius:99px;font:600 11px/1 Inter;padding:6px 11px;cursor:pointer;opacity:.85}
.sec-del:hover{opacity:1;border-color:transparent}
@media print{#editbar,#fmtbar,.sec-del{display:none!important}}

/* ---------- agenda-as-navigation: each section is its own page ---------- */
.page{display:none}
.page.active{display:block;padding-top:0;border-top:none}
main.main .page{border-top:none}
#overview.hide{display:none}
main.main > .offpage{display:none!important}
#backbar{position:fixed;top:16px;left:16px;z-index:85;display:none;
  font:500 13px/1 Inter;background:var(--surface);border:1px solid var(--line);border-radius:99px;
  padding:9px 15px;cursor:pointer;text-decoration:none;color:var(--ink);box-shadow:0 2px 12px rgba(0,0,0,.10)}
#backbar:hover{border-color:var(--muted)}
.subagenda{list-style:none;margin:8px 0 2px;padding:0}
.subagenda li{display:flex;align-items:center;gap:8px;padding:5px 0 5px 16px;border-left:2px solid var(--line);margin:2px 0}
.subagenda a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--line);font-size:13px}
.subagenda a:hover{border-color:var(--muted)}
.ref-line{margin-top:14px;font-size:12.5px;color:var(--muted)}
.ref-line a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--line)}
@media print{#backbar{display:none!important} .page{display:block!important} #overview.hide{display:block!important} main.main > .offpage{display:block!important}}

/* ---------- access-code gate ---------- */
#codegate{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;padding:24px;background:var(--bg)}
#codegate.on{display:flex}
.cg-box{max-width:360px;width:100%;text-align:center;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:34px 28px}
.cg-mark{width:48px;height:48px;border-radius:12px;background:var(--ink);color:#fff;display:inline-flex;align-items:center;justify-content:center;font:600 24px/1 Georgia,serif}
.cg-title{font:600 16px/1.3 Inter;margin-top:14px}
.cg-sub{color:var(--muted);font-size:13.5px;margin:6px 0 18px}
#codeinput{width:100%;font:400 15px/1 Inter;padding:12px 14px;border:1px solid var(--line);border-radius:10px;margin-bottom:6px}
#codeinput:focus{outline:none;border-color:#E4D3AE;background:#FFFDF5}
.cg-err{color:var(--neg);font-size:12.5px;min-height:18px;text-align:left}
.cg-btn{width:100%;justify-content:center;font:500 14px/1 Inter;padding:12px 18px;border-radius:10px;border:1px solid var(--ink);background:var(--ink);color:#fff;cursor:pointer}
.cg-btn:hover{opacity:.92}
.cg-note{color:var(--faint);font-size:12px;margin-top:16px}
@media print{#codegate{display:none!important}}
</style>
</head>

<main class="main" contenteditable="false"></main>

<div id="toast" class="">Published ✓ - live in about a minute</div>

<!-- ================= INLINE EDITOR (opens with ?edit) ================= -->
<div id="editbar" style="display: none;">
  <button id="tokenBtn" onclick="setToken()" title="Set or change your GitHub publish token">⚙</button>
  <button id="discardBtn" onclick="discardEdits()" title="Discard your local changes and reload the published page">Revert</button>
  <button id="saveFileBtn" onclick="downloadPage()" title="Download the updated index.html (offline backup)">Save file</button>
  <button id="editToggle" onclick="toggleEdit()" class="">✎ Edit</button>
  <button id="publishBtn" class="primary" onclick="publishLive()" title="Commit your changes to GitHub and go live">▲ Publish live</button>
</div>
<div id="fmtbar" style="display: none;">
  <button onmousedown="return keepSel(event)" onclick="fmt('bold')" title="Bold"><b>B</b></button>
  <button onmousedown="return keepSel(event)" onclick="fmt('italic')" title="Italic"><i>I</i></button>
  <span class="sep"></span>
  <button onmousedown="return keepSel(event)" onclick="fmt('formatBlock','H2')" title="Heading">H2</button>
  <button onmousedown="return keepSel(event)" onclick="fmt('formatBlock','H3')" title="Sub-heading">H3</button>
  <button onmousedown="return keepSel(event)" onclick="fmt('formatBlock','P')" title="Normal text">¶</button>
  <button onmousedown="return keepSel(event)" onclick="fmt('insertUnorderedList')" title="Bullet list">• List</button>
  <button onmousedown="return keepSel(event)" onclick="makeLink()" title="Add link">Link</button>
  <span class="sep"></span>
  <button onclick="addSection()" title="Add a new section at the end">＋ Section</button>
</div>
<script>
/* Inline editor - only active when the URL has ?edit. Viewers on the plain link see nothing. */
(function(){
  /* editor activates via ?edit OR automatically on devices where the publish token is saved;
     ?view always forces the read-only view */
  var hasToken = false; try{ hasToken = !!localStorage.getItem('casarico-board-gh-token'); }catch(e){}
  var EDIT = (/[?&]edit\b/.test(location.search) || /[?&]edit\b/.test(location.hash) || hasToken)
             && !/[?&]view\b/.test(location.search);
  var EKEY = 'casarico-boardpack-6-edits-v2';
  var main = document.querySelector('main.main');
  if(!EDIT || !main){
    /* not an editor: make sure the toolbar can never show (in case a published file froze it visible) */
    var eb0 = document.getElementById('editbar'); if(eb0) eb0.style.display = 'none';
    var fb0 = document.getElementById('fmtbar'); if(fb0) fb0.style.display = 'none';
    return;
  }
  var editing = false, st;
  document.body.classList.add('canedit');   /* shows capture/add controls for the editor */
  var baseline = null;   /* normalized per-section snapshot of what this tab started from */
  function normSection(s){
    var c = s.cloneNode(true);
    c.classList.remove('active','offpage','hide');
    c.querySelectorAll('.sec-del').forEach(function(x){ x.remove(); });
    c.querySelectorAll('[data-derived]').forEach(function(x){ x.innerHTML=''; });
    c.querySelectorAll('[data-cap]').forEach(function(x){ x.classList.remove('has-items'); });
    return c;
  }
  function captureBaseline(){
    baseline = {};
    main.querySelectorAll(':scope > section').forEach(function(s){
      if(s.id) baseline[s.id] = normSection(s).outerHTML;
    });
  }
  function saveNow(){ try{ localStorage.setItem(EKEY, main.innerHTML); }catch(e){} }
  function clearDraft(){ try{ localStorage.removeItem(EKEY); }catch(e){} }
  function saveSoon(){ clearTimeout(st); st = setTimeout(saveNow, 500); }
  main.addEventListener('input', saveSoon);
  /* Load the freshest PUBLISHED version (decrypting the vault when present),
     then offer any leftover unpublished draft. Called by the gate once unlocked. */
  window.__editorLoad = async function(){
    try{
      var res = await fetch('https://raw.githubusercontent.com/Casarico-ch/board/main/index.html?_=' + Date.now(), {cache:'no-store'});
      if(res.ok){
        var doc = new DOMParser().parseFromString(await res.text(), 'text/html');
        var v = doc.getElementById('board-vault');
        var cipher = v ? v.textContent.trim() : '';
        if(cipher && window.__vaultDecrypt && window.__CODE){
          try{ main.innerHTML = await window.__vaultDecrypt(cipher, window.__CODE); }catch(e){ /* keep current content */ }
        } else {
          var freshMain = doc.querySelector('main.main');
          if(freshMain && freshMain.innerHTML.trim()) main.innerHTML = freshMain.innerHTML;
        }
      }
    }catch(e){ /* offline: keep the served page */ }
    try{
      var draft = localStorage.getItem(EKEY);
      if(draft && draft !== main.innerHTML){
        if(confirm('You have unpublished changes saved on this device. Restore them?\n\nOK = restore my draft · Cancel = start from the published version')){
          main.innerHTML = draft;
        } else {
          clearDraft();
        }
      }
    }catch(e){}
    if(window.routeRefresh) window.routeRefresh();   /* re-apply page visibility after swapping content */
    if(window.bbCalc) window.bbCalc();
    captureBaseline();   /* remember what this tab started from, for section-level merge on publish */
  };
  window.keepSel = function(e){ e.preventDefault(); return false; };  /* keep the selection when clicking the toolbar */
  window.fmt = function(c, v){ document.execCommand(c, false, v || null); main.focus(); saveSoon(); };
  window.makeLink = function(){ var u = prompt('Link URL (https://…)'); if(u) window.fmt('createLink', u); };
  function addHandles(){
    main.querySelectorAll('section').forEach(function(s){
      if(s.querySelector('.sec-del')) return;
      var b = document.createElement('button');
      b.type = 'button'; b.className = 'sec-del'; b.textContent = '✕ section';
      b.setAttribute('contenteditable', 'false');
      b.onclick = function(){ if(confirm('Delete this whole section?')){ s.remove(); saveNow(); } };
      s.appendChild(b);
    });
  }
  function removeHandles(){ main.querySelectorAll('.sec-del').forEach(function(b){ b.remove(); }); }
  /* reset all transient editor UI so it never gets baked into the saved/published file */
  function cleanForSave(){
    if(editing) window.toggleEdit();
    removeHandles();
    main.setAttribute('contenteditable', 'false');
    document.body.classList.remove('editmode');
    var fb = document.getElementById('fmtbar'); if(fb) fb.style.display = 'none';
    var eb = document.getElementById('editbar'); if(eb) eb.style.display = 'none';
    /* normalize router state so the published file is not frozen mid-navigation */
    document.body.classList.remove('onpage');
    var ov = document.getElementById('overview'); if(ov) ov.classList.remove('hide');
    main.querySelectorAll('.page').forEach(function(s){ s.classList.remove('active'); });
    Array.prototype.forEach.call(main.children, function(el){ el.classList.remove('offpage'); });
    var bb = document.getElementById('backbar'); if(bb) bb.style.display = 'none';
    /* derived rollups are rebuilt at view time - never persist them */
    document.querySelectorAll('[data-derived]').forEach(function(el){ el.innerHTML=''; });
    document.body.classList.remove('canedit');
    /* strip extension artifacts */
    document.body.removeAttribute('cz-shortcut-listen');
  }
  function restoreAfterSave(){
    document.getElementById('editbar').style.display = 'flex';
    document.body.classList.add('canedit');
    if(window.routeRefresh) window.routeRefresh();
  }
  window.toggleEdit = function(){
    editing = !editing;
    main.setAttribute('contenteditable', editing ? 'true' : 'false');
    document.body.classList.toggle('editmode', editing);
    document.getElementById('fmtbar').style.display = editing ? 'flex' : 'none';
    var t = document.getElementById('editToggle');
    t.textContent = editing ? '✓ Done' : '✎ Edit';
    t.classList.toggle('primary', editing);
    if(editing){ addHandles(); main.focus(); } else { removeHandles(); saveNow(); }
  };
  window.addSection = function(){
    var s = document.createElement('section');
    s.innerHTML = '<div class="sec-head"><div><div class="eyebrow">New</div><h2>New section</h2></div></div><p>Write here …</p>';
    main.appendChild(s);
    if(editing) addHandles();
    saveNow();
    s.scrollIntoView({behavior:'smooth', block:'center'});
  };
  window.discardEdits = function(){
    if(confirm('Discard your local changes and reload the published version?')){
      try{ localStorage.removeItem(EKEY); }catch(e){}
      location.reload();
    }
  };
  window.downloadPage = function(){
    cleanForSave();
    var html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
    restoreAfterSave();
    var blob = new Blob([html], {type:'text/html;charset=utf-8'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'index.html';
    document.body.appendChild(a); a.click();
    setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); }, 500);
    if(window.toast) toast('index.html downloaded - upload it to GitHub to publish');
  };

  /* ---- Publish live: commit straight to GitHub (auto-deploys via Pages) ---- */
  var REPO = 'Casarico-ch/board', BRANCH = 'main', FILE = 'index.html';
  var TKEY = 'casarico-board-gh-token';   // token is stored only in this browser, never in the page
  function getToken(){ try{ return localStorage.getItem(TKEY) || ''; }catch(e){ return ''; } }
  window.setToken = function(){
    var cur = getToken();
    var v = prompt('Paste your GitHub token (stored only in this browser). Leave empty to remove it.', cur ? '' : '');
    if(v === null) return;
    try{ if(v){ localStorage.setItem(TKEY, v.trim()); toast('Token saved on this device'); } else { localStorage.removeItem(TKEY); toast('Token removed'); } }catch(e){}
  };
  function b64utf8(str){
    var bytes = new TextEncoder().encode(str), bin = '';
    for(var i=0;i<bytes.length;i++) bin += String.fromCharCode(bytes[i]);
    return btoa(bin);
  }
  window.publishLive = async function(){
    var token = getToken();
    if(!token){ window.setToken(); token = getToken(); if(!token) return; }
    if(!window.__CODE){ toast('Unlock with the access code before publishing'); return; }
    cleanForSave();
    var localPlain = main.innerHTML;   /* this tab's plaintext content, after cleaning */
    restoreAfterSave();
    var api = 'https://api.github.com/repos/' + REPO + '/contents/' + FILE;
    var headers = { 'Authorization':'Bearer ' + token, 'Accept':'application/vnd.github+json', 'X-GitHub-Api-Version':'2022-11-28' };
    toast('Publishing …');
    try{
      var sha, html = null;
      var cur = await fetch(api + '?ref=' + BRANCH + '&_=' + Date.now(), { headers: headers, cache:'no-store' });
      if(cur.ok){
        var curJson = await cur.json();
        sha = curJson.sha;
        var latestBytes = Uint8Array.from(atob((curJson.content || '').replace(/\s/g, '')), function(c){ return c.charCodeAt(0); });
        var latestHtml = new TextDecoder().decode(latestBytes);
        var doc = new DOMParser().parseFromString(latestHtml, 'text/html');
        var m2 = doc.querySelector('main.main');
        var vault = doc.getElementById('board-vault');
        /* decrypt the latest published content into m2 so we merge onto the freshest base */
        if(vault && vault.textContent.trim() && window.__vaultDecrypt){
          try{ m2.innerHTML = await window.__vaultDecrypt(vault.textContent.trim(), window.__CODE); }
          catch(e){ toast('Publish blocked - the live board uses a different code. Reload.'); return; }
        }
        if(m2 && baseline){
          /* merge-proof: only the SECTIONS this tab changed replace their published counterparts */
          var latestSecs = {};
          m2.querySelectorAll(':scope > section').forEach(function(s){ if(s.id) latestSecs[s.id] = s; });
          Object.keys(baseline).forEach(function(id){
            if(!main.querySelector(':scope > section[id="' + id + '"]') && latestSecs[id]){ latestSecs[id].remove(); delete latestSecs[id]; }
          });
          var prev = null;
          main.querySelectorAll(':scope > section').forEach(function(s){
            var ns = normSection(s);
            if(s.id && latestSecs[s.id]){
              if(baseline[s.id] !== ns.outerHTML){
                var repl = doc.importNode(ns, true);
                latestSecs[s.id].replaceWith(repl);
                prev = repl;
              } else { prev = latestSecs[s.id]; }
            } else {
              var add = doc.importNode(ns, true);
              if(prev && prev.nextSibling) m2.insertBefore(add, prev.nextSibling);
              else m2.appendChild(add);
              prev = add;
            }
          });
        } else if(m2){
          m2.innerHTML = localPlain;
        }
        /* encrypt the merged plaintext into the vault and strip it from <main> */
        if(m2){
          var env = await window.__vaultEncrypt(m2.innerHTML, window.__CODE);
          if(!vault){ vault = doc.createElement('script'); vault.id = 'board-vault'; vault.type = 'application/json'; doc.body.insertBefore(vault, doc.body.firstChild); }
          vault.textContent = env;
          m2.innerHTML = '';
          html = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
        }
      }
      else if(cur.status === 401 || cur.status === 403){ toast('Token rejected - set a valid token (⚙)'); return; }
      else { toast('Publish failed - could not read the live file (' + cur.status + ')'); return; }
      if(!html){ toast('Publish failed - nothing to write'); return; }
      var res = await fetch(api, { method:'PUT', headers: headers, body: JSON.stringify({
        message: 'Update board pack via in-page editor',
        content: b64utf8(html),
        sha: sha,
        branch: BRANCH
      }) });
      if(res.ok){ clearDraft(); captureBaseline(); toast('Published ✓ - live in about a minute'); }
      else {
        var e = {}; try{ e = await res.json(); }catch(_){}
        if(res.status === 401 || res.status === 403) toast('Token rejected - set a valid token (⚙)');
        else if(res.status === 409) toast('Someone else just published - reload, then publish again');
        else toast('Publish failed: ' + (e.message || res.status));
      }
    }catch(err){ toast('Publish failed - check your connection'); }
  };

  document.getElementById('editbar').style.display = 'flex';
})();
</script>

<script>
// agenda-as-navigation router: home = Overview & agenda; every other section is its own page
(function(){
  var overview = document.getElementById('overview');
  var isEditTok = false; try{ isEditTok = !!localStorage.getItem('casarico-board-gh-token'); }catch(e){}
  var isEdit = (/[?&]edit\b/.test(location.search) || /[?&]edit\b/.test(location.hash) || isEditTok)
               && !/[?&]view\b/.test(location.search);
  /* On the plain (viewer) link, lock the natively-editable fields so nobody types edits that won't save. */
  if(!isEdit){
    document.querySelectorAll('main.main [contenteditable="true"]').forEach(function(el){ el.setAttribute('contenteditable', 'false'); });
  }
  function route(){
    var id = (location.hash || '').replace(/^#\/?/, '').split('?')[0];   /* ignore a stray ?edit in the hash */
    var target = id ? document.getElementById(id) : null;
    var onPage = !!(target && target.classList.contains('page'));
    document.querySelectorAll('main.main .page').forEach(function(s){
      s.classList.toggle('active', onPage && s === target);
    });
    /* standalone-page feel: on a page, hide EVERYTHING else in the main column
       (header, agenda, any stray elements edits may have created) */
    var mainEl = document.querySelector('main.main');
    if(mainEl){
      Array.prototype.forEach.call(mainEl.children, function(el){
        el.classList.toggle('offpage', onPage && el !== target);
      });
    }
    if(overview) overview.classList.toggle('hide', onPage);
    document.getElementById('backbar').style.display = onPage ? 'inline-block' : 'none';
    document.body.classList.toggle('onpage', onPage);
    if(window.buildRollup) window.buildRollup();
    window.scrollTo(0, 0);
  }
  window.addEventListener('hashchange', route);
  window.routeRefresh = route;   /* editor calls this after refreshing content */
  route();
})();

/* ---------- decision & action capture: per-page items roll up to the summary ---------- */
(function(){
  var NAME = {financials:'Financials', q2:'Q2 review', pricing:'Pricing', zurich:'Zurich',
    offmarket:'Off-market', churn:'Immo-Ressource', buyback:'Buy-back', financing:'Financing',
    outlook:'Outlook', ai:'Automation & AI', strategy:'Strategy'};
  function escT(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function itemData(it, srcId, general){
    var txt = it.querySelector('.cap-text');
    var ow = it.querySelector('.cap-owner span');
    return { text: txt ? txt.textContent.trim() : '', owner: ow ? ow.textContent.trim() : '',
      src: srcId, label: general ? 'General' : (NAME[srcId] || srcId),
      type: it.getAttribute('data-type') || 'decision' };
  }
  window.capCollect = function(){
    var decs = [], acts = [];
    document.querySelectorAll('main.main > section').forEach(function(s){
      if(s.id === 'decisions'){
        s.querySelectorAll('#genDec .cap-item').forEach(function(it){ decs.push(itemData(it, s.id, true)); });
        s.querySelectorAll('#genAct .cap-item').forEach(function(it){ acts.push(itemData(it, s.id, true)); });
        return;
      }
      s.querySelectorAll('[data-cap] .cap-item').forEach(function(it){
        var d = itemData(it, s.id, false);
        (d.type === 'action' ? acts : decs).push(d);
      });
    });
    return { decs: decs, acts: acts };
  };
  /* ---- self-healing: rebuild capture UI if a publish rolled it out of the content ---- */
  var CAP_HTML = '<h3 class="cap-h">Decisions &amp; actions from this item</h3>'
    + '<div class="card cap-card"><div class="cap-list"></div></div>'
    + '<div class="btnrow add-cap"><button type="button" onclick="capAdd(this,\'decision\')">+ Decision</button>'
    + '<button type="button" onclick="capAdd(this,\'action\')">+ Action</button></div>';
  function ensureCaps(){
    document.querySelectorAll('main.main > section.page').forEach(function(s){
      if(s.id === 'decisions') return;
      if(!s.querySelector('[data-cap]')){
        var d = document.createElement('div');
        d.className = 'cap';
        d.setAttribute('data-cap', '');
        d.innerHTML = CAP_HTML;
        s.appendChild(d);
      }
    });
  }
  function migrateRows(table, type, list){
    table.querySelectorAll('tr.rec').forEach(function(tr){
      var cells = [];
      tr.querySelectorAll('td[contenteditable]').forEach(function(td){
        var v = td.innerText.replace(/\s+/g, ' ').trim();
        cells.push(v);
      });
      if(!cells.some(function(v){ return v; })) return;
      var d = document.createElement('div');
      d.className = 'cap-item';
      d.setAttribute('data-type', type);
      d.innerHTML = '<span class="cap-n small num" style="min-width:20px"></span>'
        + '<div class="cap-text" contenteditable="true" data-ph="' + (type === 'action' ? 'Action …' : 'Decision …') + '"></div>'
        + (type === 'action' ? '<span class="cap-owner small">Owner:&nbsp;<span contenteditable="true" data-ph="—"></span></span>' : '')
        + '<button type="button" class="ghost cap-del" onclick="capDel(this)" title="Remove">✕</button>';
      d.querySelector('.cap-text').textContent = cells[0] || '';
      if(type === 'action' && cells[1]){ d.querySelector('.cap-owner span').textContent = cells[1]; }
      list.appendChild(d);
    });
  }
  function ensureSummary(){
    var sec = document.getElementById('decisions'); if(!sec) return;
    if(sec.querySelector('#rollupDec') && sec.querySelector('#rollupAct')) return;
    function block(rollId, genId, type, label){
      var card = document.createElement('div'); card.className = 'card';
      card.innerHTML = '<div id="' + rollId + '" data-derived></div><div class="cap-list" id="' + genId + '"></div>';
      var btn = document.createElement('div'); btn.className = 'btnrow add-cap';
      btn.innerHTML = '<button type="button" onclick="capAddGeneral(\'' + type + '\')">' + label + '</button>';
      return [card, btn];
    }
    var pair, oldT, oldBtn;
    if(!sec.querySelector('#rollupDec')){
      pair = block('rollupDec', 'genDec', 'decision', '+ Add decision');
      oldT = sec.querySelector('#decTable');
      if(oldT){
        oldBtn = oldT.nextElementSibling;
        if(oldBtn && oldBtn.classList.contains('btnrow')) oldBtn.remove();
        migrateRows(oldT, 'decision', pair[0].querySelector('#genDec'));
        oldT.replaceWith(pair[0]);
      } else { sec.appendChild(pair[0]); }
      pair[0].after(pair[1]);
    }
    if(!sec.querySelector('#rollupAct')){
      pair = block('rollupAct', 'genAct', 'action', '+ Add action');
      oldT = sec.querySelector('#actTable');
      if(oldT){
        oldBtn = oldT.nextElementSibling;
        if(oldBtn && oldBtn.classList.contains('btnrow')) oldBtn.remove();
        migrateRows(oldT, 'action', pair[0].querySelector('#genAct'));
        oldT.replaceWith(pair[0]);
      } else { sec.appendChild(pair[0]); }
      pair[0].after(pair[1]);
    }
  }
  window.buildRollup = function(){
    ensureCaps();
    ensureSummary();
    /* per-page: reveal the capture card only when it has items (editor always sees it) */
    document.querySelectorAll('main.main [data-cap]').forEach(function(cap){
      cap.classList.toggle('has-items', !!cap.querySelector('.cap-item'));
    });
    var rd = document.getElementById('rollupDec'), ra = document.getElementById('rollupAct');
    if(!rd && !ra) return;
    var all = window.capCollect();
    function row(n, r){
      return '<div class="cap-item"><span class="small num" style="min-width:20px">' + n + '.</span>'
        + '<div class="cap-text">' + (escT(r.text) || '<span style="color:var(--faint)">-</span>')
        + (r.owner ? ' <span class="small">· ' + escT(r.owner) + '</span>' : '') + '</div>'
        + (r.label !== 'General' ? '<a class="cap-src" href="#' + r.src + '">' + escT(r.label) + '</a>' : '')
        + '</div>';
    }
    if(rd){
      var fromPages = all.decs.filter(function(r){ return r.label !== 'General'; });
      rd.innerHTML = fromPages.map(function(r, i){ return row(i + 1, r); }).join('');
      var n = fromPages.length;
      document.querySelectorAll('#genDec .cap-item .cap-n').forEach(function(sp){ sp.textContent = (++n) + '.'; });
      if(!n) rd.innerHTML = '<div class="empty">No decisions captured yet - add them here or on any agenda page.</div>';
    }
    if(ra){
      var fromPagesA = all.acts.filter(function(r){ return r.label !== 'General'; });
      ra.innerHTML = fromPagesA.map(function(r, i){ return row(i + 1, r); }).join('');
      var m = fromPagesA.length;
      document.querySelectorAll('#genAct .cap-item .cap-n').forEach(function(sp){ sp.textContent = (++m) + '.'; });
      if(!m) ra.innerHTML = '<div class="empty">No actions captured yet - add them here or on any agenda page.</div>';
    }
    /* viewers: anything injected/migrated stays read-only */
    if(!document.body.classList.contains('canedit')){
      document.querySelectorAll('main.main [contenteditable="true"]').forEach(function(el){ el.setAttribute('contenteditable', 'false'); });
    }
  };
  function markDirty(){
    var m = document.querySelector('main.main');
    if(m) m.dispatchEvent(new Event('input', {bubbles: true}));
  }
  function itemHtml(type, numbered){
    var head = numbered ? '<span class="cap-n small num" style="min-width:20px"></span>'
      : (type === 'action' ? '<span class="chip disc">Action</span>' : '<span class="chip pos">Decision</span>');
    var owner = type === 'action' ? '<span class="cap-owner small">Owner:&nbsp;<span contenteditable="true" data-ph="-"></span></span>' : '';
    return head + '<div class="cap-text" contenteditable="true" data-ph="' + (type === 'action' ? 'Action …' : 'Decision …') + '"></div>' + owner
      + '<button type="button" class="ghost cap-del" onclick="capDel(this)" title="Remove">✕</button>';
  }
  function newItem(type, numbered){
    var d = document.createElement('div');
    d.className = 'cap-item';
    d.setAttribute('data-type', type);
    d.innerHTML = itemHtml(type, numbered);
    return d;
  }
  window.capAdd = function(btn, type){
    var cap = btn.closest('[data-cap]'); if(!cap) return;
    var list = cap.querySelector('.cap-list'); if(!list) return;
    var d = newItem(type, false);
    list.appendChild(d);
    markDirty(); window.buildRollup();
    var t = d.querySelector('.cap-text'); if(t) t.focus();
  };
  window.capAddGeneral = function(type){
    var list = document.getElementById(type === 'action' ? 'genAct' : 'genDec'); if(!list) return;
    var d = newItem(type, true);
    list.appendChild(d);
    markDirty(); window.buildRollup();
    var t = d.querySelector('.cap-text'); if(t) t.focus();
  };
  window.capDel = function(btn){
    var it = btn.closest('.cap-item'); if(!it) return;
    it.remove();
    markDirty(); window.buildRollup();
  };
  /* live-refresh rollup numbers/text when typing inside capture items on the summary page */
  document.addEventListener('input', function(e){
    if(e.target && e.target.closest && e.target.closest('#genDec, #genAct')) window.buildRollup();
  });
  window.buildRollup();
})();

/* buy-back worked-example calculator (event-delegated; harmless if the elements are edited away) */
(function(){
  function chf(n){
    var neg = n < 0; var s = String(Math.round(Math.abs(n)));
    s = s.replace(/\B(?=(\d{3})+(?!\d))/g, '’');
    return (neg ? '− ' : '') + 'CHF ' + s;
  }
  function put(id, n, forceMinus){
    var el = document.getElementById(id); if(!el) return;
    el.textContent = (forceMinus && n > 0 ? '− ' + chf(n) : chf(n));
  }
  function calc(){
    var vEl = document.getElementById('bbV'), mEl = document.getElementById('bbM');
    if(!vEl || !mEl) return;
    var V = parseFloat(vEl.value) || 0, M = parseFloat(mEl.value) || 0;
    var G = 0.85 * V, fee = 0.005 * G;
    var cap = Math.max(0, G - M);
    var aEl = document.getElementById('bbA');
    var draw = aEl ? Math.min(Math.max(parseFloat(aEl.value) || 0, 0), cap) : cap;
    var interest = 0.05 * draw, repay = draw + interest;
    var notarySale = 0.001 * V;       /* market sale: paid by the customer */
    var notaryBuy = 0.001 * G;        /* activation: paid by the buyer vehicle */
    put('bbG', G); put('bbCap', cap);
    put('bbMv', V); put('bbMm', M, true); put('bbMr', repay, true); put('bbMf', fee, true);
    put('bbMno', notarySale, true);
    put('bbMn', V - M - repay - fee - notarySale);
    put('bbBg', G); put('bbBm', M, true); put('bbBr', repay, true);
    var bno = document.getElementById('bbBno'); if(bno) bno.textContent = '≈ ' + chf(notaryBuy);
    put('bbBn', G - M - repay);
  }
  document.addEventListener('input', function(e){
    if(e.target && (e.target.id === 'bbV' || e.target.id === 'bbM' || e.target.id === 'bbA')) calc();
  });
  document.addEventListener('change', function(e){
    /* settle the drawn amount to its cap once the user leaves the field */
    if(!e.target || e.target.id !== 'bbA') return;
    var vEl = document.getElementById('bbV'), mEl = document.getElementById('bbM');
    if(!vEl || !mEl) return;
    var cap = Math.max(0, 0.85 * (parseFloat(vEl.value) || 0) - (parseFloat(mEl.value) || 0));
    var draw = Math.min(Math.max(parseFloat(e.target.value) || 0, 0), cap);
    e.target.value = Math.round(draw);
    calc();
  });
  document.addEventListener('click', function(e){
    var t = e.target.closest('.bb-tab'); if(!t) return;
    document.querySelectorAll('.bb-tab').forEach(function(b){ b.classList.toggle('on', b === t); });
    var mode = t.getAttribute('data-bb');
    var mp = document.getElementById('bbMarket'), bp = document.getElementById('bbBackstop');
    if(mp) mp.style.display = (mode === 'market') ? '' : 'none';
    if(bp) bp.style.display = (mode === 'backstop') ? '' : 'none';
  });
  window.bbCalc = calc;
  calc();
})();

function toast(msg){
  var t = document.getElementById('toast');

  clearTimeout(t._h); t._h = setTimeout(function(){ t.classList.remove('show'); }, 1800);
}

<script>
/* ================= access-code vault: content is AES-encrypted; the code unlocks it ================= */
(function(){
  var VKEY = 'casarico-board-code';   // remembers the code on this device (like the GitHub token)
  var main = document.querySelector('main.main');
  var gate = document.getElementById('codegate');
  var vaultEl = document.getElementById('board-vault');
  function b64(bytes){ var s=''; for(var i=0;i<bytes.length;i++) s+=String.fromCharCode(bytes[i]); return btoa(s); }
  function ub64(str){ var bin=atob(str), a=new Uint8Array(bin.length); for(var i=0;i<bin.length;i++) a[i]=bin.charCodeAt(i); return a; }
  async function deriveKey(pass, salt){
    var mat = await crypto.subtle.importKey('raw', new TextEncoder().encode(pass), {name:'PBKDF2'}, false, ['deriveKey']);
    return crypto.subtle.deriveKey({name:'PBKDF2', salt:salt, iterations:150000, hash:'SHA-256'}, mat, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']);
  }
  window.__vaultEncrypt = async function(plaintext, pass){
    var salt = crypto.getRandomValues(new Uint8Array(16));
    var iv = crypto.getRandomValues(new Uint8Array(12));
    var key = await deriveKey(pass, salt);
    var ct = new Uint8Array(await crypto.subtle.encrypt({name:'AES-GCM', iv:iv}, key, new TextEncoder().encode(plaintext)));
    return JSON.stringify({v:1, kdf:'PBKDF2-SHA256', iter:150000, salt:b64(salt), iv:b64(iv), ct:b64(ct)});
  };
  window.__vaultDecrypt = async function(envStr, pass){
    var env = JSON.parse(envStr);
    var key = await deriveKey(pass, ub64(env.salt));
    var pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:ub64(env.iv)}, key, ub64(env.ct));
    return new TextDecoder().decode(pt);
  };

  function afterUnlock(){
    if(window.routeRefresh) window.routeRefresh();
    if(window.buildRollup) window.buildRollup();
    if(window.bbCalc) window.bbCalc();
    if(window.__editorLoad) window.__editorLoad();
  }

  var cipher = vaultEl ? vaultEl.textContent.trim() : '';
  if(!cipher){
    /* no vault (plaintext file) - nothing to unlock; run the app on the content that's already there */
    afterUnlock();
    return;
  }

  async function unlock(code, fromCache){
    try{
      var plain = await window.__vaultDecrypt(cipher, code);
      main.innerHTML = plain;
      window.__CODE = code;
      try{ localStorage.setItem(VKEY, code); }catch(e){}
      gate.classList.remove('on');
      afterUnlock();
      return true;
    }catch(e){
      try{ localStorage.removeItem(VKEY); }catch(_){}
      if(!fromCache){
        var er = document.getElementById('codeerr'); if(er) er.textContent = 'Wrong code - try again.';
        var ci = document.getElementById('codeinput'); if(ci) ci.select();
      }
      return false;
    }
  }
  window.__submitCode = function(){ var v = document.getElementById('codeinput').value; if(v) unlock(v, false); };

  var cached = ''; try{ cached = localStorage.getItem(VKEY) || ''; }catch(e){}
  if(cached){
    unlock(cached, true).then(function(ok){ if(!ok){ gate.classList.add('on'); focusInput(); } });
  } else {
    gate.classList.add('on'); focusInput();
  }
  function focusInput(){ setTimeout(function(){ var i = document.getElementById('codeinput'); if(i) i.focus(); }, 30); }
})();
